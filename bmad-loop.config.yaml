# BMAD Loop Orchestrator Configuration
# Project: 3d-print-flow

project:
  name: "3d-print-flow"
  path: "/Users/paolo/repos/personal/3d-print-flow"
  sprint_status: "_bmad-output/implementation-artifacts/sprint-status.yaml"
  story_location: "_bmad-output/implementation-artifacts"

branch_strategy:
  base_branch: "develop"
  feature_branch_prefix: "feat/"
  merge_after_review: true
  push_after_merge: true

models:
  create_story: "opus"
  code_review: "opus"
  dev_story_default: "sonnet"
  epic_overrides:
    epic-2: "sonnet"
    epic-3: "opus"
    epic-4: "sonnet"
  story_overrides:
    2-4-catalog-to-queue-live-binding: "opus"

budget:
  create_story_max_usd: 2
  dev_story_max_usd: 5
  code_review_max_usd: 3

timeouts:
  create_story_seconds: 300
  dev_story_seconds: 1800
  code_review_seconds: 900

workflow:
  max_review_passes: 3
  max_consecutive_failures: 3
  update_github_issues: true
  extra_dev_instructions: |
    Follow the vercel-react-best-practices skill patterns for all React components, hooks, and modules.
    Use the shadcn MCP server when installing or configuring shadcn/ui components.
  extra_review_instructions: |
    Also verify that all modified/created files follow the vercel-react-best-practices skill patterns.
    Flag any violations as issues.

notifications:
  log_file: "_bmad-output/implementation-artifacts/bmad-loop-activity.log"

cron:
  interval_minutes: 5
